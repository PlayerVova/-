<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player_Vova — ПивоМен</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-primary: #1e1e2f;
            --text-secondary: #555555;
            --accent: #6c5ce7;
            --accent-hover: #5a4bcf;
            --border-light: #dddddd;
            --pixel-shadow: #c0c0c0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
        }
        .game-card {
            max-width: 700px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 0;
            border: 4px solid var(--text-primary);
            box-shadow: 8px 8px 0 var(--pixel-shadow);
            padding: 40px 35px;
            transition: 0.2s;
        }
        .game-card:hover {
            box-shadow: 12px 12px 0 var(--pixel-shadow);
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            line-height: 1.1;
            word-break: break-word;
        }
        .subhead {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            border-left: 6px solid var(--accent);
            padding-left: 20px;
        }
        .description {
            margin: 25px 0;
            font-size: 1.1rem;
            background: var(--bg-color);
            padding: 20px;
            border: 2px dashed var(--accent);
        }
        .requirements {
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
        }
        .req-item {
            flex: 1 1 180px;
            background: var(--bg-color);
            padding: 15px;
            border: 2px solid var(--border-light);
            text-align: center;
            font-weight: 500;
        }
        .req-item strong {
            display: block;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .download-btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-size: 2rem;
            font-weight: 700;
            padding: 20px 40px;
            border: 4px solid var(--text-primary);
            box-shadow: 6px 6px 0 var(--pixel-shadow);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.1s;
            margin: 20px 0 15px;
            width: 100%;
            text-align: center;
        }
        .download-btn:hover {
            background: var(--accent-hover);
            box-shadow: 8px 8px 0 var(--pixel-shadow);
        }
        .download-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0 var(--pixel-shadow);
        }
        .file-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            text-align: center;
        }
        .author {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-top: 4px dotted var(--accent);
            padding-top: 25px;
            margin-top: 20px;
        }
        .author-name {
            font-size: 1.1rem;
        }
        .author-name span {
            font-weight: 700;
            color: var(--accent);
        }
        .author-nick {
            background: var(--bg-color);
            padding: 8px 25px;
            border: 2px solid var(--border-light);
            font-weight: 500;
        }
        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
        }
        @media (max-width: 500px) {
            .game-card {
                padding: 25px 20px;
            }
            h1 {
                font-size: 2.5rem;
            }
            .download-btn {
                font-size: 1.5rem;
                padding: 15px 20px;
            }
            .requirements {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="game-card">
        <h1>ПивоМен</h1>
        <div class="subhead">пиксельная драка в стиле Undertale</div>
        <div class="requirements">
            <div class="req-item"><strong>ОС</strong> Windows / macOS / Linux</div>
            <div class="req-item"><strong>Python</strong> 3.7.6+ (64-bit)</div>
            <div class="req-item"><strong>ОЗУ</strong> от 512 МБ</div>
            <div class="req-item"><strong>Место</strong> 30.8 МБ</div>
        </div>
        <a href="https://disk.yandex.ru/d/-HohDmG68ja4bA" download class="download-btn">Скачать на пк</a>
        <div class="file-info">Архив game.zip • 30.8 МБ</div>
        <div class="author">
            <div class="author-name">
                <span>Соловьёв Владимир Владимирович</span> <br> разработчик
            </div>
            <div class="author-nick">Player_Vova</div>
        </div>

        <div class="footer">
            © 2026 — бесплатная игра
        </div>
    </div>
</body>
<script>
  // Публичная ссылка на файл на Яндекс.Диске (запасной вариант)
  const PUBLIC_KEY = 'https://disk.yandex.ru/d/-HohDmG68ja4bA';
  const downloadBtn = document.querySelector('.download-btn');

  // Устанавливаем запасную ссылку на случай ошибки
  downloadBtn.href = PUBLIC_KEY;

  // Функция для получения свежей прямой ссылки
  async function getDirectLink() {
    try {
      const encodedKey = encodeURIComponent(PUBLIC_KEY);
      const apiUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=${encodedKey}`;
      const response = await fetch(apiUrl);
      if (!response.ok) throw new Error('Ошибка API');
      const data = await response.json();
      if (!data.href) throw new Error('Нет ссылки в ответе');
      return data.href;
    } catch (error) {
      console.error('Не удалось получить прямую ссылку:', error);
      return null; // при ошибке вернём null
    }
  }

  // Обработчик клика по кнопке
  downloadBtn.addEventListener('click', async (event) => {
    event.preventDefault(); // Отменяем стандартный переход по ссылке

    // Показываем, что что-то происходит (опционально)
    downloadBtn.textContent = '⏳ Получаем ссылку...';

    const directLink = await getDirectLink();
    if (directLink) {
      // Если получили прямую ссылку — переходим по ней
      window.location.href = directLink;
    } else {
      // Если ошибка — переходим на запасную страницу Диска
      window.location.href = PUBLIC_KEY;
    }

    // Восстанавливаем текст кнопки (на случай, если переход не произошёл мгновенно)
    setTimeout(() => {
      downloadBtn.textContent = 'Скачать на пк';
    }, 3000);
  });
</script>
</html>
