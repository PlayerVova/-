<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать мою игру</title>
    <style>
        /* Это простые стили, чтобы страница выглядела красиво */
        body {
            font-family: sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #0f3460;
        }
        p {
            margin-bottom: 30px;
            color: #ccc;
        }
        .download-btn {
            background-color: #e94560;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
            display: inline-block;
        }
        .download-btn:hover {
            background-color: #ff6b8b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Моя Крутая Игра</h1>
        <p>Нажми на кнопку, чтобы скачать последнюю версию (ZIP-архив).</p>
        
        <!-- КНОПКА СКАЧИВАНИЯ -->
        <!-- Убедись, что имя файла совпадает с тем, что лежит в папке -->
        <a href="Game.zip" class="download-btn" download>⬇️ Скачать игру</a>
        
        <p style="margin-top: 20px; font-size: 14px;">
            После скачивания распакуй архив и запусти Game.exe
        </p>
    </div>
</body>
</html>
