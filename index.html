<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player_Vova - ПивоМен</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #141311;
            --card-bg: rgba(83, 55, 0, 0.85);
            --text-primary: #ffe592;
            --text-secondary: #ffffff;
            --accent: #e9b700;
            --accent-hover: #bb9300;
            --border-light: #ffda00;
            --pixel-shadow: #2f2a22;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Shantell Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(to right, rgba(90, 70, 0, 1) 4px, transparent 1px),
                linear-gradient(to bottom, rgba(90, 70, 0, 1) 4px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0;
            pointer-events: none;
            z-index: -1;
            animation: moveGrid 1s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .game-card {
            max-width: 700px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 0;
            border: 4px solid var(--text-primary);
            box-shadow: 8px 8px 0 var(--pixel-shadow);
            padding: 40px 35px;
            transition: 0.2s;
            position: relative;
        }
        .game-card:hover {
            box-shadow: 12px 12px 0 var(--pixel-shadow);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            line-height: 1.1;
            word-break: break-word;
        }
        .subhead {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            border-left: 6px solid var(--accent);
            padding-left: 20px;
        }
        .description {
            margin: 25px 0;
            font-size: 1.1rem;
            background: var(--bg-color);
            padding: 20px;
            border: 2px dashed var(--accent);
        }
        .requirements {
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
        }
        .req-item {
            flex: 1 1 180px;
            background: var(--bg-color);
            padding: 15px;
            border: 2px solid var(--border-light);
            text-align: center;
            font-weight: 500;
        }
        .req-item strong {
            display: block;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .download-btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-size: 2rem;
            font-weight: 700;
            padding: 20px 40px;
            border: 4px solid var(--text-primary);
            box-shadow: 6px 6px 0 var(--pixel-shadow);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.1s;
            margin: 20px 0 15px;
            width: 100%;
            text-align: center;
        }
        .download-btn:hover {
            background: var(--accent-hover);
            box-shadow: 8px 8px 0 var(--pixel-shadow);
        }
        .download-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0 var(--pixel-shadow);
        }
        .file-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            text-align: center;
        }
        .author {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-top: 4px dotted var(--accent);
            padding-top: 25px;
            margin-top: 20px;
        }
        .author-name {
            font-size: 1.1rem;
        }
        .author-name span {
            font-weight: 700;
            color: var(--accent);
        }
        .author-nick {
            background: var(--bg-color);
            padding: 8px 25px;
            border: 2px solid var(--border-light);
            font-weight: 500;
        }
        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
        }
    @media (max-width: 600px) {
        body {
            padding: 10px;
        }
        .game-card {
            padding: 20px 15px;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 1px;
        }
        .subhead {
            font-size: 1rem;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .requirements {
            flex-direction: column;
            gap: 8px;
            margin: 15px 0;
        }
        .req-item {
            flex: 1 1 auto;
            padding: 10px 12px;
            font-size: 0.9rem;
            border-width: 1px;
            background: rgba(20, 19, 17, 0.7);
        }
        .req-item strong {
            display: inline;
            margin-right: 5px;
        }
        .download-btn {
            font-size: 1.6rem;
            padding: 15px 20px;
            margin: 15px 0 10px;
        }
        .file-info {
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .author {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            padding-top: 20px;
        }
        .author-nick {
            align-self: flex-start;
        }
        .footer {
            font-size: 0.8rem;
            margin-top: 20px;
        }
        body::before {
            background-image: 
                linear-gradient(to right, rgba(105, 82, 0, 0.3) 2px, transparent 1px),
                linear-gradient(to bottom, rgba(105, 82, 0, 0.3) 2px, transparent 1px);
            background-size: 30px 30px;
            animation: moveGrid 2s linear infinite;
        }
        .game-card {
            background: rgba(83, 55, 0, 0.95);
        }
    }
    </style>
</head>
<body>
    <div class="game-card">
        <h1>ПивоМен</h1>
        <div class="subhead">пиксельная драка в стиле Undertale</div>
        <div class="requirements">
            <div class="req-item"><strong>ОС</strong>Windows / macOS / Linux</div>
            <div class="req-item"><strong>Python</strong>3.7.6+ (64-bit)</div>
            <div class="req-item"><strong>ОЗУ</strong>от 512 мб</div>
            <div class="req-item"><strong>Место</strong>30.8 мб</div>
            <div class="req-item"><strong>Загрузка</strong>Google Drive</div>
        </div>
        <a href="https://drive.google.com/uc?export=download&id=1sOjNRvNf2lZhhy4dZj7TPldDlp242SdQ" class="download-btn" download>Скачать на пк</a>
        <div class="file-info">Архив game.zip • 30.8 МБ</div>
        <div class="author">
            <div class="author-name">
                <span>Соловьёв Владимир Владимирович</span> <br> разработчик
            </div>
            <div class="author-nick">Player_Vova</div>
        </div>
        <div class="footer">
            © 2026 — бесплатная игра
        </div>
    </div>
</body>
</html>
